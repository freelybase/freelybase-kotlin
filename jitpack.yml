# jitpack.yml
before_install:
  - wget https://github.com/freelybase/freelybase-kotlin/releases/download/${VERSION}/freelybase-kotlin-${VERSION}.aar
  - wget https://github.com/freelybase/freelybase-kotlin/releases/download/${VERSION}/freelybase-kotlin-${VERSION}.pom

install:
  - mvn install:install-file -Dfile=freelybase-kotlin-${VERSION}.aar -DgroupId=com.github.freelybase -DartifactId=freelybase-kotlin -Dversion=${VERSION} -Dpackaging=aar -DpomFile=freelybase-kotlin-${VERSION}.pom